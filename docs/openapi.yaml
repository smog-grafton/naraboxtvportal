      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: Success
                    type: object
                    example:
                      status: success
                      redirect_url: /dashboard
                    properties:
                      status:
                        type: string
                        example: success
                      redirect_url:
                        type: string
                        example: /dashboard
                  -
                    description: Failed
                    type: object
                    example:
                      status: failed
                      redirect_url: /dashboard
                      message: 'Payment failed'
                    properties:
                      status:
                        type: string
                        example: failed
                      redirect_url:
                        type: string
                        example: /dashboard
                      message:
                        type: string
                        example: 'Payment failed'
                  -
                    description: Pending
                    type: object
                    example:
                      status: pending
                      message: 'Waiting for confirmation'
                    properties:
                      status:
                        type: string
                        example: pending
                      message:
                        type: string
                        example: 'Waiting for confirmation'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized
                properties:
                  error:
                    type: string
                    example: Unauthorized
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'Transaction not found'
                properties:
                  error:
                    type: string
                    example: 'Transaction not found'
      tags:
        - Payments
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_ref:
                  type: string
                  description: 'The `transaction_ref` from `/iotec/initiate`.'
