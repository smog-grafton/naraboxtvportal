      tags:
        - Authentication
      security: []
  /api/v1/auth/me:
    get:
      summary: 'Get current authenticated user'
      operationId: getCurrentAuthenticatedUser
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
