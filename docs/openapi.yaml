      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  transaction_id: 501
                  deposit_id: a232abbe-3006-3f67-bed4-124abab91dce
                  transaction_ref: NBX-PWP-ABC123XYZ0-1710240000
                  status: PENDING
                  message: 'Deposit initiated. Check your phone to approve payment.'
                properties:
                  success:
                    type: boolean
                    example: true
                  transaction_id:
                    type: integer
                    example: 501
                  deposit_id:
                    type: string
                    example: a232abbe-3006-3f67-bed4-124abab91dce
                  transaction_ref:
                    type: string
                    example: NBX-PWP-ABC123XYZ0-1710240000
                  status:
                    type: string
                    example: PENDING
                  message:
                    type: string
                    example: 'Deposit initiated. Check your phone to approve payment.'
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'PawaPay gateway is not available'
                properties:
                  error:
                    type: string
                    example: 'PawaPay gateway is not available'
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  status: FAILED
                  message: 'Invalid phone number. Use 07XXXXXXXX, 7XXXXXXXX, +2567XXXXXXXX or 2567XXXXXXXX.'
                properties:
                  success:
                    type: boolean
                    example: false
                  status:
                    type: string
                    example: FAILED
                  message:
                    type: string
                    example: 'Invalid phone number. Use 07XXXXXXXX, 7XXXXXXXX, +2567XXXXXXXX or 2567XXXXXXXX.'
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media_id:
                  type: integer
                  description: 'required_if:type,RENT,BUY The movie/TV show id for rent/buy.'
                  example: 1
                media_type:
                  type: string
                  description: 'required_if:type,RENT,BUY Must be `MOVIE` or `TV_SHOW`.'
                  example: MOVIE
                type:
                  type: string
                  description: 'One of `RENT`, `BUY`, `SUBSCRIPTION`.'
                  example: SUBSCRIPTION
                subscription_plan_id:
                  type: integer
                  description: 'required_if:type,SUBSCRIPTION The subscription plan id.'
                  example: 3
                phone:
                  type: string
                  description: 'Uganda phone (07XXXXXXXX, 7XXXXXXXX, +2567XXXXXXXX or 2567XXXXXXXX).'
                  example: '0770000000'
                provider:
                  type: string
                  description: 'PawaPay provider code. One of `MTN_MOMO_UGA`, `AIRTEL_OAPI_UGA`.'
                  example: MTN_MOMO_UGA
                currency:
                  type: string
                  description: 'Three-letter currency code (eg. `UGX`).'
                  example: UGX
                deposit_id:
                  type: string
                  description: 'uuid nullable Optional client-generated deposit UUID.'
                  example: a232abbe-3006-3f67-bed4-124abab91dce
                  nullable: true
                client_reference_id:
                  type: string
                  description: 'nullable Optional client reference id echoed back in provider callbacks.'
                  example: mobile-app-checkout-123
