      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
              required:
                - email
      security: []
  /api/v1/auth/reset-password:
    post:
      summary: 'Reset password with token'
      operationId: resetPasswordWithToken
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                token:
                  type: string
                  description: ''
                  example: architecto
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: ']|{+-0pBNvYg'
              required:
                - email
                - token
                - password
      security: []
  /api/v1/auth/google/url:
