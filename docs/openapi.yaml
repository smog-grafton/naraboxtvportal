      operationId: initiateIoTecPayCollectionphonePromptInSite
      description: "Starts an **in-app** mobile money collection via ioTec Pay:\n- Validates phone number format for Uganda\n- Creates a `payment_transactions` row with provider_code `IOTEC`\n- Sends a mobile money prompt to the user’s phone\n\nFrontend should:\n- Call this endpoint when the user chooses ioTec Pay\n- Then poll `POST /api/v1/iotec/status` with the returned `transaction_ref`\n\n`type` and amount rules are identical to `/payments/initiate`."
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  transaction_ref: NBX-IOT-ABC123XYZ0-1710240000
                  payment_id: 101
                  status: PENDING
                  message: 'Prompt sent to 25678*****000'
                properties:
                  transaction_ref:
                    type: string
                    example: NBX-IOT-ABC123XYZ0-1710240000
                  payment_id:
                    type: integer
                    example: 101
                  status:
                    type: string
                    example: PENDING
                  message:
                    type: string
                    example: 'Prompt sent to 25678*****000'
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'ioTec Pay gateway is not available'
                properties:
                  error:
                    type: string
                    example: 'ioTec Pay gateway is not available'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized
                properties:
                  error:
                    type: string
                    example: Unauthorized
        422:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'Invalid Uganda phone number. Use 256XXXXXXXXX or 0XXXXXXXXX.'
                properties:
                  error:
                    type: string
                    example: 'Invalid Uganda phone number. Use 256XXXXXXXXX or 0XXXXXXXXX.'
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media_id:
                  type: integer
                  description: 'required_if:type,RENT,BUY The movie/TV show id for rent/buy.'
                  example: 1
                media_type:
                  type: string
                  description: 'required_if:type,RENT,BUY Must be `MOVIE` or `TV_SHOW`.'
                  example: MOVIE
                type:
                  type: string
                  description: 'One of `RENT`, `BUY`, `SUBSCRIPTION`.'
                  example: SUBSCRIPTION
                subscription_plan_id:
                  type: integer
                  description: 'required_if:type,SUBSCRIPTION The subscription plan id.'
                  example: 3
                phone:
                  type: string
                  description: 'Uganda phone in `2567XXXXXXXX` or `07XXXXXXXX` format.'
                  example: '256780000000'
                return_url:
                  type: string
                  description: 'nullable Relative or same-origin URL to redirect to after success (eg. `/dashboard`).'
