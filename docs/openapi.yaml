  '/api/v1/player/{id}':
    get:
      summary: 'Get playback manifest for a movie or TV show episode'
      operationId: getPlaybackManifestForAMovieOrTVShowEpisode
      description: "Resolve the best video source, subtitles, and downloads for a movie or TV episode.\nThis powers the watch page player.\n\nPass `media_type=MOVIE` for movies (default) or `media_type=TV_SHOW` for series.\nFor TV shows, also pass the `episode` query param with the episode ID.\n\nAccess rules:\n- Free content (`is_free = 1`) is always playable (no auth required).\n- Premium content (`is_premium = 1`) requires an active subscription.\n- Paid content (`price_rent`/`price_buy`) requires a successful rent or purchase.\n\nOn success, returns:\n- `movie`: minimal media metadata (id, title, images, download_enabled)\n- `episode`: minimal episode metadata when applicable\n- `videoUrl`: primary play URL (HLS master or MP4)\n- `videoSources`: all available qualities and formats\n- `subtitles`: all available subtitle tracks\n- `duration`: duration in seconds (best-effort)\n- `poster`: poster/backdrop URL for the player\n- `downloadSources`: downloadable variants (if enabled and user has access)\n- `playback`: normalized playback manifest (`type`, `url`, `hls_master_url`, `mp4_play_url`, `qualities`, etc.)"
      parameters:
        -
          in: query
          name: media_type
          description: 'MOVIE or TV_SHOW. Defaults to MOVIE.'
          example: MOVIE
          required: false
          schema:
            type: string
            description: 'MOVIE or TV_SHOW. Defaults to MOVIE.'
            example: MOVIE
        -
          in: query
          name: episode
          description: 'The `id` of the episode when `media_type` is TV_SHOW.'
          example: 419
          required: false
          schema:
            type: integer
            description: 'The `id` of the episode when `media_type` is TV_SHOW.'
            example: 419
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
