  /api/v1/access/check:
    post:
      summary: 'Check if user has access to a movie or TV show'
      operationId: checkIfUserHasAccessToAMovieOrTVShow
      description: "Frontend helper to decide whether to show **Play**, **Rent**, **Buy**, **Subscribe**, or a locked state.\n\nRules:\n- Free content (`is_free = 1`) is always accessible (no auth required).\n- Premium content (`is_premium = 1`) requires an active subscription.\n- Paid content with `price_rent` / `price_buy` checks rentals and purchases.\n- Pending transactions are surfaced so the UI can show “Pending approval”.\n\nReturns a normalized `access_type`:\n- `FREE`\n- `SUBSCRIPTION`\n- `PREMIUM` (subscription required, but none active)\n- `PURCHASED`\n- `RENTED`\n- `PENDING`\n- `PAID` (payment required: rent and/or buy)"
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: ''
                    type: object
                    example:
                      has_access: true
                      access_type: FREE
                      reason: 'Content is free'
                    properties:
                      has_access:
                        type: boolean
                        example: true
                      access_type:
                        type: string
                        example: FREE
                      reason:
                        type: string
                        example: 'Content is free'
                  -
                    description: 'Premium with active subscription'
                    type: object
                    example:
                      has_access: true
                      access_type: SUBSCRIPTION
                      reason: 'You have an active subscription'
                      subscription_expires_at: '2026-03-31T20:00:00+03:00'
                    properties:
                      has_access:
                        type: boolean
                        example: true
                      access_type:
                        type: string
                        example: SUBSCRIPTION
                      reason:
                        type: string
                        example: 'You have an active subscription'
                      subscription_expires_at:
                        type: string
                        example: '2026-03-31T20:00:00+03:00'
                  -
                    description: 'Paid but not yet rented/bought'
                    type: object
                    example:
                      has_access: false
                      access_type: PAID
                      reason: 'Payment required'
                      can_rent: true
                      can_buy: true
                      rent_price: 1000
                      buy_price: 2200
                    properties:
                      has_access:
                        type: boolean
                        example: false
                      access_type:
                        type: string
                        example: PAID
                      reason:
                        type: string
                        example: 'Payment required'
                      can_rent:
                        type: boolean
                        example: true
                      can_buy:
                        type: boolean
                        example: true
                      rent_price:
                        type: integer
                        example: 1000
                      buy_price:
                        type: integer
                        example: 2200
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  has_access: false
                  access_type: null
                  reason: 'Authentication required'
                  requires_auth: true
                properties:
                  has_access:
                    type: boolean
                    example: false
                  access_type:
                    type: string
                    example: null
                    nullable: true
                  reason:
                    type: string
                    example: 'Authentication required'
                  requires_auth:
                    type: boolean
                    example: true
        404:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'Media not found'
                properties:
                  error:
                    type: string
                    example: 'Media not found'
      tags:
        - 'Access & Views'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media_id:
                  type: integer
                  description: 'The `id` of the movie or TV show to check.'
                  example: 1
                media_type:
                  type: string
                  description: 'Must be `MOVIE` or `TV_SHOW`.'
                  example: MOVIE
              required:
                - media_id
                - media_type
      security: []
