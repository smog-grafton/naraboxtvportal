openapi: 3.0.3
info:
  title: 'NaraBox TV Portal API v1'
  description: 'REST API for the NaraBox TV streaming portal. Powers the Next.js frontend with content (movies, TV shows, VJs), authentication, playback, subscriptions, rentals, and payments.'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
tags:
  -
    name: Authentication
    description: "\nRegister, login, profile, OAuth, password reset, and email verification."
  -
    name: Hero
    description: "\nHomepage carousel slides (each slide is a movie)."
  -
    name: Movies
    description: "\nList and fetch movies. Supports filters: category, genre, vj, has_vj, filter (free|rent|purchase|premium|featured), sort (trending|latest|rating)."
  -
    name: 'TV Shows'
    description: "\nList and fetch TV shows with seasons and episodes."
  -
    name: Search
    description: "\nGlobal search. Query: q. Returns archives (movies/TV), people (VJs), intel (articles)."
  -
    name: VJs
    description: "\nList and fetch VJs (translators/presenters). Filter by featured; order by rating or movies count."
  -
    name: Articles
    description: "\nNews/editorial. List and fetch by id or slug; filter by category, top_news."
  -
    name: Contact
    description: "\nSubmit contact form (name, email, subject, message). No auth."
  -
    name: 'Live Streams'
    description: "\nLive channels. List with optional type=live|archived; get by id."
  -
    name: Actors
    description: "\nCast. List with search/trending; get by id or slug with movies."
  -
    name: 'Player & Downloads'
    description: "\nPlayback manifest (video URLs, HLS, subtitles, download sources). Optional auth for premium/rent/buy."
  -
    name: 'Access & Views'
    description: "\nCheck access to content (free/subscription/rent/buy); track views."
  -
    name: 'Subscription plans'
    description: "\nPublic list of subscription plans (no auth required)."
  -
    name: Payments
    description: "\nPayment gateways (list), initiate payment (rent/buy/subscription), upload proof (manual), verify."
  -
    name: 'Dashboard & Watch history'
    description: "\nUser dashboard: subscription, rentals, purchases, transactions, watch history. Requires auth."
  -
    name: Comments
    description: "\nComments on media (media_id = movie id). List (public), add (auth or anonymous with user_name), like, delete (auth, own)."
  -
    name: 'Ad banners'
    description: "\nRead-only banner API for web/app clients."
  -
    name: Endpoints
    description: ''
  -
    name: 'Push devices'
    description: "\nRegister and manage device tokens for push notifications."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via <code>POST /api/v1/auth/login</code> or <code>POST /api/v1/auth/register</code>. Send it as <code>Authorization: Bearer {token}</code> on protected endpoints.'
security:
  -
    default: []
paths:
  /api/v1/auth/register:
    post:
      summary: 'Register a new user'
      operationId: registerANewUser
      description: 'Returns user and Bearer token. Email is auto-verified by default.'
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                password:
                  type: string
                  description: 'Must be at least 8 characters.'
                  example: '-0pBNvYgxw'
                phone:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: a
                  nullable: true
              required:
                - name
                - email
                - password
      security: []
  /api/v1/auth/login:
    post:
      summary: 'Login user with email and password'
      operationId: loginUserWithEmailAndPassword
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                password:
                  type: string
                  description: ''
                  example: '|]|{+-'
              required:
                - email
                - password
      security: []
  /api/v1/auth/phone/request-otp:
    post:
      summary: 'Request phone login OTP.'
      operationId: requestPhoneLoginOTP
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
              required:
                - phone
      security: []
  /api/v1/auth/phone/verify-otp:
    post:
      summary: 'Verify phone OTP and login/register user.'
      operationId: verifyPhoneOTPAndLoginregisterUser
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                code:
                  type: string
                  description: 'Must be 6 characters.'
                  example: ngzmiy
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: v
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: jdach@example.org
                  nullable: true
              required:
                - phone
                - code
      security: []
  /api/v1/auth/google/mobile:
    post:
      summary: 'Handle mobile Google login/register using an access token.'
      operationId: handleMobileGoogleLoginregisterUsingAnAccessToken
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                access_token:
                  type: string
                  description: ''
                  example: architecto
              required:
                - access_token
      security: []
  /api/v1/auth/apple/mobile:
    post:
      summary: 'Handle Apple login/register (mobile).'
      operationId: handleAppleLoginregistermobile
      description: "NOTE: This implementation assumes the mobile app has already obtained and\nvalidated the Apple identity token. For production-hardening, wire this\nto proper server-side Apple token validation."
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                apple_user_id:
                  type: string
                  description: ''
                  example: architecto
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: zbailey@example.net
                  nullable: true
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: i
                  nullable: true
              required:
                - apple_user_id
      security: []
  /api/v1/auth/verify-email:
    post:
      summary: 'Verify email with code'
      operationId: verifyEmailWithCode
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
                code:
                  type: string
                  description: 'Must be 6 characters.'
                  example: miyvdl
              required:
                - email
                - code
      security: []
  /api/v1/auth/resend-verification:
    post:
      summary: 'Resend verification code'
      operationId: resendVerificationCode
      description: ''
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address.'
                  example: gbailey@example.net
              required:
