  /api/v1/payments/initiate:
    post:
      summary: 'Initiate a payment (rent, buy, or subscription)'
      operationId: initiateAPaymentrentBuyOrSubscription
      description: "Creates a `payment_transactions` row and returns a `transaction_ref`\nthat the frontend can use with the appropriate gateway flow.\n\nFor **manual** gateways:\n- Returns bank/mobile-money instructions and `paymentDetails`\n- Frontend must call `POST /api/v1/payments/upload-proof` afterwards\n\nFor **automatic** gateways:\n- Returns a generic “PENDING” status and `transaction_ref`\n- The actual collection happens via gateway-specific endpoints\n  (eg. ioTec, PawaPay) or external UIs."
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 'Manual gateway'
                    type: object
                    example:
                      transaction_ref: NBX-3Y7Z5K0PQ8LM
                      amount: 1000
                      status: PENDING
                      gateway_type: MANUAL
                      instructions: 'Send UGX 1,000 to MTN 0770 000 000 and include your transaction_ref in the note.'
                      payment_details:
                        account_name: 'NaraBox TV'
                        account_number: '0770000000'
                        provider: 'MTN MoMo'
                      message: 'Please follow the instructions and upload proof of payment'
                    properties:
                      transaction_ref:
                        type: string
                        example: NBX-3Y7Z5K0PQ8LM
                      amount:
                        type: integer
                        example: 1000
                      status:
                        type: string
                        example: PENDING
                      gateway_type:
                        type: string
                        example: MANUAL
                      instructions:
                        type: string
                        example: 'Send UGX 1,000 to MTN 0770 000 000 and include your transaction_ref in the note.'
                      payment_details:
                        type: object
                        properties:
                          account_name:
                            type: string
                            example: 'NaraBox TV'
                          account_number:
                            type: string
                            example: '0770000000'
                          provider:
                            type: string
                            example: 'MTN MoMo'
                      message:
                        type: string
                        example: 'Please follow the instructions and upload proof of payment'
                  -
                    description: 'Automatic gateway'
                    type: object
                    example:
                      transaction_ref: NBX-5K8LM3Y7Z0PQ
                      amount: 8500
                      status: PENDING
                      gateway_type: AUTOMATIC
                      message: 'Payment initiated. Please complete on your device.'
                    properties:
                      transaction_ref:
                        type: string
                        example: NBX-5K8LM3Y7Z0PQ
                      amount:
                        type: integer
                        example: 8500
                      status:
                        type: string
                        example: PENDING
                      gateway_type:
                        type: string
                        example: AUTOMATIC
                      message:
                        type: string
                        example: 'Payment initiated. Please complete on your device.'
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'Invalid amount'
                properties:
                  error:
                    type: string
                    example: 'Invalid amount'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized
                properties:
                  error:
                    type: string
                    example: Unauthorized
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                media_id:
                  type: integer
                  description: 'required_if:type,RENT,BUY The movie/TV show id for rent/buy.'
                  example: 1
                media_type:
                  type: string
                  description: 'required_if:type,RENT,BUY Must be `MOVIE` or `TV_SHOW`.'
                  example: MOVIE
                type:
                  type: string
                  description: 'One of `RENT`, `BUY`, `SUBSCRIPTION`.'
                  example: RENT
                gateway_id:
                  type: integer
                  description: 'The `id` of the selected payment gateway.'
                  example: 3
                subscription_plan_id:
                  type: integer
                  description: 'required_if:type,SUBSCRIPTION The `id` of the subscription plan.'
                  example: 2
                phone:
                  type: string
                  description: 'nullable Phone number (used by some mobile money gateways).'
                  example: '256780000000'
                  nullable: true
              required:
                - type
                - gateway_id
  /api/v1/payments/upload-proof:
    post:
      summary: 'Upload payment proof for manual payments'
      operationId: uploadPaymentProofForManualPayments
      description: "After a manual payment (bank or mobile money), the user uploads a screenshot\nor PDF. Admins then review and approve/reject in the back office.\n\nThis endpoint:\n- Stores the file under `storage/app/public/payment-proofs`\n- Creates a `payments` row with status `PENDING`"
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Payment proof uploaded. Waiting for admin approval.'
                  payment_id: 42
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Payment proof uploaded. Waiting for admin approval.'
                  payment_id:
                    type: integer
                    example: 42
        400:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: 'Transaction is not pending'
                properties:
                  error:
                    type: string
                    example: 'Transaction is not pending'
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized
                properties:
                  error:
                    type: string
                    example: Unauthorized
      tags:
        - Payments
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                transaction_ref:
                  type: string
                  description: 'The `transaction_ref` returned from `/payments/initiate`.'
                  example: NBX-3Y7Z5K0PQ8LM
                proof:
                  type: string
                  format: binary
                  description: 'Image or PDF file up to 10MB. Must be jpeg, jpg, png, or pdf.'
                notes:
                  type: string
                  description: 'nullable Optional notes from the user. Max 1000 characters.'
                  example: 'Paid using MTN at 10:32pm.'
                  nullable: true
              required:
                - transaction_ref
                - proof
  /api/v1/payments/verify:
    post:
      summary: 'Verify payment (for automatic gateways)'
      operationId: verifyPaymentforAutomaticGateways
      description: "Frontend helper to confirm if a payment has been completed and access granted.\n\nBehaviour:\n- For **manual** gateways: checks the related `payments` record and returns:\n  - `APPROVED` when admin has approved (and access has been granted)\n  - `REJECTED` when admin rejected\n  - `PENDING` while awaiting review\n- For **automatic** gateways: currently simulates a success and calls\n  `PaymentApprovalService::grantAccess()`. In production, this should\n  be wired to the real provider status API."
      parameters:
        -
          in: header
          name: X-API-KEY
          description: ''
          example: FMfcgzQfCMsttJHqsljxCcRXXfdTvGrN
          schema:
            type: string
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 'Manual gateway approved'
                    type: object
                    example:
                      success: true
                      status: APPROVED
                      message: 'Payment approved. Access granted.'
                    properties:
                      success:
                        type: boolean
                        example: true
                      status:
                        type: string
                        example: APPROVED
                      message:
                        type: string
                        example: 'Payment approved. Access granted.'
                  -
                    description: 'Manual gateway pending'
                    type: object
                    example:
                      success: false
                      status: PENDING
                      message: 'Payment is pending admin approval'
                    properties:
                      success:
                        type: boolean
                        example: false
                      status:
                        type: string
                        example: PENDING
                      message:
                        type: string
                        example: 'Payment is pending admin approval'
                  -
                    description: 'Automatic gateway success'
                    type: object
                    example:
                      success: true
                      transaction:
                        ref: NBX-5K8LM3Y7Z0PQ
                        status: SUCCESS
                        type: RENT
                    properties:
                      success:
                        type: boolean
                        example: true
                      transaction:
                        type: object
                        properties:
                          ref:
                            type: string
                            example: NBX-5K8LM3Y7Z0PQ
                          status:
                            type: string
                            example: SUCCESS
                          type:
                            type: string
                            example: RENT
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  error: Unauthorized
                properties:
                  error:
                    type: string
                    example: Unauthorized
      tags:
        - Payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transaction_ref:
                  type: string
                  description: 'The `transaction_ref` to verify.'
                  example: NBX-3Y7Z5K0PQ8LM
              required:
                - transaction_ref
